<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Neon Snake — A premium retro-neon arcade snake game. How long can you survive?">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
    <title>Neon Snake - Premium Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-dark: #050505;
            --glass-bg: rgba(15, 15, 15, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            touch-action: none;
        }

        /* === MAIN LAYOUT === */
        #app-wrapper {
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 10px;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 60px rgba(0, 255, 204, 0.15);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
        }

        canvas {
            display: block;
            background-color: #000;
            image-rendering: pixelated;
        }

        /* === HUD === */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 8px 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
            z-index: 10;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: clamp(0.55rem, 2vw, 0.9rem);
            flex-wrap: wrap; gap: 6px;
        }

        .neon-text { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }
        .neon-p1 { color: var(--neon-cyan); }

        /* === UI OVERLAYS === */
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--glass-border);
            overflow-y: auto;
            padding: 15px;
        }
        .ui-overlay.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.4rem, 5vw, 3.5rem);
            margin: 0 0 20px 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan);
            letter-spacing: 4px;
            text-align: center;
        }

        .stats {
            margin-top: 0.5rem; font-size: 1rem;
            display: flex; flex-direction: column; gap: 8px; align-items: center;
        }

        button {
            padding: 10px 22px; font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            background: transparent; color: #fff;
            border: 2px solid #fff; border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px;
            margin: 6px;
            touch-action: manipulation;
        }
        button:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }

        #single-btn { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        #single-btn:hover { background: var(--neon-cyan); box-shadow: 0 0 25px var(--neon-cyan); }
        #exit-btn { border-color: #ff4444; color: #ff4444; padding: 4px 10px; font-size: 0.65rem; }
        #exit-btn:hover { background: #ff4444; box-shadow: 0 0 20px #ff4444; }

        input[type="text"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff; padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; border-radius: 8px;
            margin: 4px; text-align: center;
            transition: all 0.3s ease;
            width: clamp(120px, 35vw, 200px);
        }
        input[type="text"]:focus { outline: none; box-shadow: 0 0 10px var(--neon-cyan); }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 5;
        }

        .p-instr { font-size: 0.6rem; text-align: center; margin: 2px 0; }

        /* === D-PAD — Always visible on touch devices === */
        #d-pad {
            display: none; /* Hidden by default, shown via JS on touch devices */
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            gap: 8px;
            flex-shrink: 0;
        }
        #d-pad.active { display: grid; }

        .d-btn {
            width: clamp(44px, 10vmin, 65px);
            height: clamp(44px, 10vmin, 65px);
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            color: var(--neon-cyan);
            display: flex; justify-content: center; align-items: center;
            font-size: clamp(1rem, 3vmin, 1.5rem);
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .d-btn:active {
            background: var(--neon-cyan); color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        #d-up { grid-area: up; }
        #d-down { grid-area: down; }
        #d-left { grid-area: left; }
        #d-right { grid-area: right; }

        /* === ROTATE OVERLAY === */
        #rotate-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }
        @media (orientation: portrait) and (max-width: 900px) and (hover: none) {
            #rotate-overlay { display: flex; }
        }
        .rotate-icon {
            font-size: 3rem; margin-bottom: 15px;
            animation: spin 2s infinite ease-in-out;
            color: var(--neon-cyan);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>
    <div id="rotate-overlay">
        <div class="rotate-icon">📱</div>
        <h2 style="font-family: 'Orbitron'; font-size: clamp(1rem, 5vw, 1.5rem);">ROTATE YOUR DEVICE</h2>
        <p style="margin-top: 10px; opacity: 0.7; font-size: 0.8rem;">Play in landscape for the best experience.</p>
    </div>

    <div id="app-wrapper">
        <div id="game-container">
            <div id="hud">
                <div><span id="p1-label" class="neon-p1">SNAKE</span>: <span id="p1-score">0</span></div>
                <div id="speed-display">SPD: <span id="speed-val">0</span></div>
                <button id="exit-btn">EXIT</button>
            </div>

            <canvas id="gameCanvas"></canvas>
            <div class="scanlines"></div>

            <!-- Start Screen -->
            <div id="start-screen" class="ui-overlay">
                <h1>NEON SNAKE</h1>
                <div style="margin-bottom: 15px; display: flex; flex-wrap: wrap; justify-content: center;">
                    <input type="text" id="p1-name-input" placeholder="YOUR NAME" maxlength="10">
                </div>
                <div style="margin-bottom: 15px;">
                    <button id="single-btn">PLAY</button>
                </div>
                <div>
                    <div class="p-instr"><span class="neon-p1">CONTROLS</span> — Arrows / Touch / Swipe</div>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="ui-overlay hidden">
                <h1 id="game-over-title">GAME OVER</h1>
                <div id="winner-text" style="font-size: 1.2rem; margin-bottom: 15px;"></div>
                <button id="restart-btn" style="margin-top: 15px;">PLAY AGAIN</button>
            </div>
        </div>

        <!-- D-Pad: Placed OUTSIDE game-container, BESIDE it -->
        <div id="d-pad">
            <div id="d-up" class="d-btn" aria-label="Move Up">▲</div>
            <div id="d-left" class="d-btn" aria-label="Move Left">◀</div>
            <div id="d-right" class="d-btn" aria-label="Move Right">▶</div>
            <div id="d-down" class="d-btn" aria-label="Move Down">▼</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const p1ScoreVal = document.getElementById('p1-score');
        const speedValDisplay = document.getElementById('speed-val');
        const winnerText = document.getElementById('winner-text');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const singleBtn = document.getElementById('single-btn');
        const restartBtn = document.getElementById('restart-btn');
        const exitBtn = document.getElementById('exit-btn');
        const p1NameInput = document.getElementById('p1-name-input');
        const p1Label = document.getElementById('p1-label');
        const dPad = document.getElementById('d-pad');

        // Constants
        const BOARD_SIZE = 30;
        const INITIAL_SNAKE_LENGTH = 3;
        const FOOD_COUNT = 5;
        const SCORE_PER_FOOD = 10;
        const SPEED_INCREMENT = 2;
        const INITIAL_SPEED = 120;
        const MIN_SPEED = 30;
        const MAX_SPEED = 200;

        let GRID_SIZE = 15;
        let logicalWidth = BOARD_SIZE * GRID_SIZE;
        let logicalHeight = BOARD_SIZE * GRID_SIZE;
        let animFrameId = null;
        let isTouchDevice = false;
        function detectTouch() { isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0); }
        detectTouch();

        let p1 = {
            name: 'SNAKE', snake: [], dir: 'right', nextDir: 'right',
            score: 0, active: true,
            colorHead: '#00ffcc', colorBody: '#00ccaa'
        };

        let foods = [];
        let gameActive = false;
        let lastUpdateTime = 0;
        let speed = INITIAL_SPEED;
        let baseSpeed = INITIAL_SPEED;

        // === RESIZE ENGINE ===
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const wrapperPadding = 20;
            const hudHeight = 50;

            // Account for D-pad width if on touch device and game is active
            const dPadSpace = (isTouchDevice && gameActive) ? (clampVal(44, window.innerHeight * 0.1, 65) * 3 + 30) : 0;

            const availableWidth = window.innerWidth - wrapperPadding - dPadSpace;
            const availableHeight = window.innerHeight - wrapperPadding - hudHeight;

            GRID_SIZE = Math.max(8, Math.floor(Math.min(availableWidth, availableHeight) / BOARD_SIZE));

            logicalWidth = BOARD_SIZE * GRID_SIZE;
            logicalHeight = BOARD_SIZE * GRID_SIZE;

            canvas.style.width = logicalWidth + 'px';
            canvas.style.height = logicalHeight + 'px';
            canvas.width = logicalWidth * dpr;
            canvas.height = logicalHeight * dpr;

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);

            if (!gameActive) draw();
        }

        function clampVal(min, val, max) { return Math.max(min, Math.min(max, val)); }

        // === GAME LOGIC ===
        function initGame() {
            const n1 = p1NameInput.value.trim().toLowerCase();
            p1.name = (n1 === 'yahya' ? 'yahya' : (n1 || 'SNAKE')).toUpperCase();
            p1Label.textContent = p1.name;

            p1.snake = [];
            for (let i = 0; i < INITIAL_SNAKE_LENGTH; i++) p1.snake.push({x: 5 - i, y: Math.floor(BOARD_SIZE / 2)});
            p1.dir = 'right'; p1.nextDir = 'right';
            p1.score = 0; p1.active = true;

            baseSpeed = INITIAL_SPEED;
            speed = INITIAL_SPEED;
            updateScores();
            foods = [];
            for (let i = 0; i < FOOD_COUNT; i++) spawnFood();
            gameActive = true;

            if (isTouchDevice) dPad.classList.add('active');

            resizeCanvas();
            lastUpdateTime = performance.now();
            if (animFrameId) cancelAnimationFrame(animFrameId);
            animFrameId = requestAnimationFrame(gameLoop);
        }

        function updateScores() {
            p1ScoreVal.textContent = p1.score;
            speedValDisplay.textContent = Math.round(1000 / speed);
        }

        function spawnFood() {
            let attempts = 0;
            while (attempts < BOARD_SIZE * BOARD_SIZE) {
                const f = { x: Math.floor(Math.random() * BOARD_SIZE), y: Math.floor(Math.random() * BOARD_SIZE) };
                const occupied = s => s.x === f.x && s.y === f.y;
                if (!p1.snake.some(occupied) && !foods.some(occupied)) {
                    foods.push(f);
                    return;
                }
                attempts++;
            }
        }

        function handleInput(e) {
            const key = e.key.toLowerCase();
            if (key === 'arrowup' && p1.dir !== 'down') p1.nextDir = 'up';
            if (key === 'arrowdown' && p1.dir !== 'up') p1.nextDir = 'down';
            if (key === 'arrowleft' && p1.dir !== 'right') p1.nextDir = 'left';
            if (key === 'arrowright' && p1.dir !== 'left') p1.nextDir = 'right';
        }

        function moveSnake() {
            const head = { ...p1.snake[0] };
            if (p1.dir === 'up') head.y -= 1;
            if (p1.dir === 'down') head.y += 1;
            if (p1.dir === 'left') head.x -= 1;
            if (p1.dir === 'right') head.x += 1;
            return head;
        }

        function checkCollision(head) {
            if (!head) return false;
            if (head.x < 0 || head.x >= BOARD_SIZE || head.y < 0 || head.y >= BOARD_SIZE) return true;
            if (p1.snake.some(s => s.x === head.x && s.y === head.y)) return true;
            return false;
        }

        function update() {
            if (!gameActive) return;

            p1.dir = p1.nextDir;
            const head = moveSnake();

            if (checkCollision(head)) {
                endGame();
                return;
            }

            p1.snake.unshift(head);
            const idx = foods.findIndex(f => f.x === head.x && f.y === head.y);
            if (idx !== -1) {
                p1.score += SCORE_PER_FOOD; updateScores();
                foods.splice(idx, 1); spawnFood();
                baseSpeed = Math.max(MIN_SPEED, baseSpeed - SPEED_INCREMENT);
            } else { p1.snake.pop(); }

            speed = Math.max(MIN_SPEED, baseSpeed);
        }

        function drawSnake(p) {
            p.snake.forEach((seg, i) => {
                const isHead = i === 0;
                ctx.fillStyle = isHead ? p.colorHead : p.colorBody;
                ctx.shadowBlur = isHead ? 15 : 8;
                ctx.shadowColor = isHead ? p.colorHead : p.colorBody;
                const size = isHead ? GRID_SIZE - 2 : GRID_SIZE - 4;
                const off = isHead ? 1 : 2;
                ctx.fillRect(seg.x * GRID_SIZE + off, seg.y * GRID_SIZE + off, size, size);
            });
        }

        function draw() {
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, logicalWidth, logicalHeight);

            ctx.strokeStyle = 'rgba(0, 255, 204, 0.04)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= logicalWidth; i += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, logicalHeight); ctx.stroke(); }
            for (let i = 0; i <= logicalHeight; i += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(logicalWidth, i); ctx.stroke(); }

            ctx.fillStyle = '#ffff00';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ffff00';
            foods.forEach(f => {
                ctx.fillRect(f.x * GRID_SIZE + 2, f.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
            });

            if (p1.active) drawSnake(p1);
            ctx.shadowBlur = 0;
        }

        function endGame() {
            gameActive = false;
            if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
            document.getElementById('game-over-title').textContent = "GAME OVER";
            winnerText.textContent = p1.name + ": " + p1.score;
            gameOverScreen.classList.remove('hidden');
            dPad.classList.remove('active');
            resizeCanvas();
        }

        function gameLoop(currentTime) {
            if (!gameActive) return;
            if (currentTime - lastUpdateTime >= speed) {
                update(); draw();
                lastUpdateTime = currentTime;
            }
            animFrameId = requestAnimationFrame(gameLoop);
        }

        // === EVENT LISTENERS ===
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', () => { resizeCanvas(); setTimeout(resizeCanvas, 150); });
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 250));
        window.addEventListener('keydown', handleInput);

        // Touch D-pad
        ['d-up', 'd-down', 'd-left', 'd-right'].forEach(id => {
            const dir = id.replace('d-', '');
            const btn = document.getElementById(id);
            const handler = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const opp = { up: 'down', down: 'up', left: 'right', right: 'left' };
                if (p1.dir === opp[dir]) return;
                p1.nextDir = dir;
            };
            btn.addEventListener('touchstart', handler, { passive: false });
            btn.addEventListener('mousedown', handler);
        });

        // Swipe gestures as backup
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (!gameActive) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx), absDy = Math.abs(dy);
            if (Math.max(absDx, absDy) < 30) return; // Too small
            if (absDx > absDy) {
                if (dx > 0 && p1.dir !== 'left') p1.nextDir = 'right';
                else if (dx < 0 && p1.dir !== 'right') p1.nextDir = 'left';
            } else {
                if (dy > 0 && p1.dir !== 'up') p1.nextDir = 'down';
                else if (dy < 0 && p1.dir !== 'down') p1.nextDir = 'up';
            }
        }, { passive: true });

        // Button listeners
        singleBtn.addEventListener('click', () => { startScreen.classList.add('hidden'); initGame(); });
        restartBtn.addEventListener('click', () => { gameOverScreen.classList.add('hidden'); initGame(); });
        exitBtn.addEventListener('click', () => {
            gameActive = false;
            if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
            startScreen.classList.remove('hidden');
            gameOverScreen.classList.add('hidden');
            dPad.classList.remove('active');
            resizeCanvas();
        });

        // Prevent scroll during game
        document.body.addEventListener('touchmove', (e) => { if (gameActive) e.preventDefault(); }, { passive: false });

        // Init
        resizeCanvas();
        draw();
    </script>
</body>
</html>
