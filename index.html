<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Neon Duel — A premium retro-neon arcade snake game. Play solo or duel a friend!">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
    <title>Neon Duel - Premium Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-dark: #050505;
            --glass-bg: rgba(15, 15, 15, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            touch-action: none;
        }

        /* === MAIN LAYOUT === */
        #app-wrapper {
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 5px;
        }

        /* Portrait: stack board on top, d-pad below */
        @media (orientation: portrait) {
            #app-wrapper { flex-direction: column; }
        }
        /* Landscape: board left, d-pad right */
        @media (orientation: landscape) {
            #app-wrapper { flex-direction: row; }
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.1);
            border-radius: 6px;
            overflow: hidden;
            background: #000;
            flex-shrink: 1;
            min-width: 0;
            min-height: 0;
        }

        canvas {
            display: block;
            background-color: #000;
            image-rendering: pixelated;
        }

        /* === HUD === */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 8px 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
            z-index: 10;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: clamp(0.55rem, 2vw, 0.9rem);
            flex-wrap: wrap; gap: 6px;
        }

        .neon-text { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }
        .neon-p1 { color: var(--neon-cyan); }
        .neon-p2 { color: var(--neon-magenta); }

        /* === UI OVERLAYS === */
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--glass-border);
            overflow-y: auto;
            padding: 15px;
        }
        .ui-overlay.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 5vmin, 3.5rem);
            margin: 0 0 clamp(5px, 2vh, 20px) 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan);
            letter-spacing: 4px;
            text-align: center;
        }

        .stats {
            margin-top: 0.5rem; font-size: 1rem;
            display: flex; flex-direction: column; gap: 8px; align-items: center;
        }

        button {
            padding: 10px 22px; font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            background: transparent; color: #fff;
            border: 2px solid #fff; border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px;
            margin: 6px;
            touch-action: manipulation;
        }
        button:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }

        #single-btn { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        #single-btn:hover { background: var(--neon-cyan); box-shadow: 0 0 25px var(--neon-cyan); }
        #dual-btn { border-color: var(--neon-magenta); color: var(--neon-magenta); }
        #dual-btn:hover { background: var(--neon-magenta); box-shadow: 0 0 25px var(--neon-magenta); }
        #exit-btn { border-color: #ff4444; color: #ff4444; padding: 4px 10px; font-size: 0.65rem; }
        #exit-btn:hover { background: #ff4444; box-shadow: 0 0 20px #ff4444; }

        input[type="text"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff; padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; border-radius: 8px;
            margin: 4px; text-align: center;
            transition: all 0.3s ease;
            width: clamp(120px, 35vw, 200px);
        }
        input[type="text"]:focus { outline: none; box-shadow: 0 0 10px var(--neon-cyan); }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 5;
        }

        .p-instr { font-size: 0.6rem; text-align: center; margin: 2px 0; }

        /* === D-PAD === */
        #d-pad {
            display: none;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            gap: 6px;
            flex-shrink: 0;
        }
        #d-pad.active { display: grid; }

        .d-btn {
            width: clamp(48px, 12vmin, 70px);
            height: clamp(48px, 12vmin, 70px);
            background: rgba(0, 255, 204, 0.08);
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            color: var(--neon-cyan);
            display: flex; justify-content: center; align-items: center;
            font-size: clamp(1.1rem, 3.5vmin, 1.8rem);
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        .d-btn:active {
            background: var(--neon-cyan); color: #000;
            box-shadow: 0 0 25px var(--neon-cyan);
        }

        #d-up { grid-area: up; }
        #d-down { grid-area: down; }
        #d-left { grid-area: left; }
        #d-right { grid-area: right; }

        /* CSS-only fallback: always show D-pad on touch devices */
        @media (hover: none) and (pointer: coarse) {
            #d-pad { display: grid !important; }
        }

        /* Compact UI for small screens */
        @media (max-height: 500px) {
            h1 { font-size: 1rem; margin-bottom: 5px; letter-spacing: 2px; }
            .ui-overlay { padding: 5px; justify-content: flex-start; padding-top: 10px; }
            button { padding: 5px 12px; font-size: 0.65rem; margin: 2px; }
            input[type="text"] { padding: 5px; font-size: 0.65rem; width: 90px; margin: 2px; }
            .p-instr { font-size: 0.45rem; }
            .stats { font-size: 0.7rem; gap: 2px; }
            #hud { padding: 3px 6px; font-size: 0.45rem; gap: 4px; }
            #exit-btn { padding: 2px 6px; font-size: 0.45rem; }
        }

    </style>
</head>
<body>
    <div id="app-wrapper">
        <div id="game-container">
            <div id="hud">
                <div><span id="p1-label" class="neon-p1">P1</span>: <span id="p1-score">0</span></div>
                <div id="speed-display">SPD: <span id="speed-val">0</span></div>
                <div><span id="p2-label" class="neon-p2">P2</span>: <span id="p2-score">0</span></div>
                <button id="exit-btn">EXIT</button>
            </div>

            <canvas id="gameCanvas"></canvas>
            <div class="scanlines"></div>

            <!-- Start Screen -->
            <div id="start-screen" class="ui-overlay">
                <h1>NEON DUEL</h1>
                <div style="margin-bottom: clamp(5px, 2vh, 15px); display: flex; flex-wrap: wrap; justify-content: center;">
                    <input type="text" id="p1-name-input" placeholder="PLAYER 1" maxlength="10">
                    <input type="text" id="p2-name-input" placeholder="PLAYER 2" maxlength="10">
                </div>
                <div style="margin-bottom: clamp(3px, 1vh, 15px);">
                    <button id="single-btn">SOLITARY</button>
                    <button id="dual-btn">DUEL</button>
                </div>
                <div>
                    <div class="p-instr"><span class="neon-p1">P1</span> — Arrows / Touch</div>
                    <div class="p-instr"><span class="neon-p2">P2</span> — WASD</div>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="ui-overlay hidden">
                <h1 id="game-over-title">KO</h1>
                <div id="winner-text" style="font-size: 1.2rem; margin-bottom: 15px;"></div>
                <div class="stats">
                    <div id="p1-stats">P1: <span id="p1-final" class="neon-p1">0</span></div>
                    <div id="p2-stats">P2: <span id="p2-final" class="neon-p2">0</span></div>
                </div>
                <button id="restart-btn" style="margin-top: 15px;">REMATCH</button>
            </div>
        </div>

        <!-- D-Pad: Placed OUTSIDE game-container, BESIDE it -->
        <div id="d-pad">
            <div id="d-up" class="d-btn" aria-label="Move Up">▲</div>
            <div id="d-left" class="d-btn" aria-label="Move Left">◀</div>
            <div id="d-right" class="d-btn" aria-label="Move Right">▶</div>
            <div id="d-down" class="d-btn" aria-label="Move Down">▼</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const p1ScoreVal = document.getElementById('p1-score');
        const p2ScoreVal = document.getElementById('p2-score');
        const speedValDisplay = document.getElementById('speed-val');
        const winnerText = document.getElementById('winner-text');
        const p1Final = document.getElementById('p1-final');
        const p2Final = document.getElementById('p2-final');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const singleBtn = document.getElementById('single-btn');
        const dualBtn = document.getElementById('dual-btn');
        const restartBtn = document.getElementById('restart-btn');
        const exitBtn = document.getElementById('exit-btn');
        const p1NameInput = document.getElementById('p1-name-input');
        const p2NameInput = document.getElementById('p2-name-input');
        const p1Label = document.getElementById('p1-label');
        const p2Label = document.getElementById('p2-label');
        const dPad = document.getElementById('d-pad');

        // Constants
        const BOARD_SIZE = 30;
        const INITIAL_SNAKE_LENGTH = 3;
        const FOOD_COUNT = 5;
        const SCORE_PER_FOOD = 10;
        const SPEED_INCREMENT = 2;
        const INITIAL_SPEED = 120;
        const MIN_SPEED = 30;
        const MAX_SPEED = 200;

        let GRID_SIZE = 12;
        let logicalWidth = BOARD_SIZE * GRID_SIZE;
        let logicalHeight = BOARD_SIZE * GRID_SIZE;
        let animFrameId = null;
        let isTouchDevice = false;

        // Detect touch device reliably
        function detectTouch() {
            isTouchDevice = ('ontouchstart' in window) ||
                            (navigator.maxTouchPoints > 0) ||
                            (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
            // Always show D-pad on touch devices
            if (isTouchDevice) {
                dPad.classList.add('active');
            } else {
                dPad.classList.remove('active');
            }
        }
        detectTouch();

        // Game State
        let gameMode = 'dual';
        let p1 = {
            name: 'P1', snake: [], dir: 'right', nextDir: 'right',
            score: 0, active: true, eliminated: false,
            colorHead: '#00ffcc', colorBody: '#00ccaa'
        };
        let p2 = {
            name: 'P2', snake: [], dir: 'left', nextDir: 'left',
            score: 0, active: true, eliminated: false,
            colorHead: '#ff00ff', colorBody: '#cc00cc'
        };

        let foods = [];
        let gameActive = false;
        let lastUpdateTime = 0;
        let speed = INITIAL_SPEED;
        let baseSpeed = INITIAL_SPEED;

        // === RESIZE ENGINE ===
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const isPortrait = window.innerHeight > window.innerWidth;

            // Calculate D-pad space
            let dPadW = 0, dPadH = 0;
            if (isTouchDevice) {
                const btnSize = clampVal(48, window.innerHeight * 0.12, 70);
                if (isPortrait) {
                    dPadH = btnSize * 3 + 25; // D-pad below
                } else {
                    dPadW = btnSize * 3 + 25; // D-pad beside
                }
            }

            const pad = 10;
            const hudH = 40;
            const availW = window.innerWidth - pad * 2 - dPadW;
            const availH = window.innerHeight - pad * 2 - hudH - dPadH;

            GRID_SIZE = Math.max(6, Math.floor(Math.min(availW, availH) / BOARD_SIZE));

            logicalWidth = BOARD_SIZE * GRID_SIZE;
            logicalHeight = BOARD_SIZE * GRID_SIZE;

            canvas.style.width = logicalWidth + 'px';
            canvas.style.height = logicalHeight + 'px';
            canvas.width = logicalWidth * dpr;
            canvas.height = logicalHeight * dpr;

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);

            if (!gameActive) draw();
        }

        function clampVal(min, val, max) { return Math.max(min, Math.min(max, val)); }

        // === GAME LOGIC ===
        function initGame(mode) {
            gameMode = mode || gameMode;

            const n1 = p1NameInput.value.trim().toLowerCase();
            p1.name = (n1 === 'yahya' ? 'yahya' : (n1 || 'P1')).toUpperCase();
            p1Label.textContent = p1.name;

            if (gameMode === 'dual') {
                const n2 = p2NameInput.value.trim().toLowerCase();
                p2.name = (n2 === 'yahya' ? 'yahya' : (n2 || 'P2')).toUpperCase();
                p2Label.textContent = p2.name;
                p2NameInput.style.display = 'inline-block';
            } else {
                p2NameInput.style.display = 'none';
            }

            const cols = BOARD_SIZE;

            p1.snake = [];
            for (let i = 0; i < INITIAL_SNAKE_LENGTH; i++) p1.snake.push({x: 5 - i, y: Math.floor(BOARD_SIZE / 2)});
            p1.dir = 'right'; p1.nextDir = 'right';
            p1.score = 0; p1.active = true; p1.eliminated = false;

            if (gameMode === 'dual') {
                p2.snake = [];
                for (let i = 0; i < INITIAL_SNAKE_LENGTH; i++) p2.snake.push({x: cols - 6 + i, y: Math.floor(BOARD_SIZE / 2)});
                p2.dir = 'left'; p2.nextDir = 'left';
                p2.score = 0; p2.active = true; p2.eliminated = false;
                p2ScoreVal.parentElement.style.display = 'block';
            } else {
                p2.active = false; p2.eliminated = true; p2.snake = [];
                p2ScoreVal.parentElement.style.display = 'none';
            }

            baseSpeed = INITIAL_SPEED;
            speed = INITIAL_SPEED;
            updateScores();
            foods = [];
            for (let i = 0; i < FOOD_COUNT; i++) spawnFood();
            gameActive = true;

            // D-pad is always visible on touch devices — no need to toggle

            resizeCanvas();

            lastUpdateTime = performance.now();
            if (animFrameId) cancelAnimationFrame(animFrameId);
            animFrameId = requestAnimationFrame(gameLoop);
        }

        function updateScores() {
            p1ScoreVal.textContent = p1.score;
            if (gameMode === 'dual') p2ScoreVal.textContent = p2.score;
            speedValDisplay.textContent = Math.round(1000 / speed);
        }

        function spawnFood() {
            let attempts = 0;
            while (attempts < BOARD_SIZE * BOARD_SIZE) {
                const f = { x: Math.floor(Math.random() * BOARD_SIZE), y: Math.floor(Math.random() * BOARD_SIZE) };
                const occupied = s => s.x === f.x && s.y === f.y;
                if (!p1.snake.some(occupied) && !p2.snake.some(occupied) && !foods.some(occupied)) {
                    foods.push(f);
                    return;
                }
                attempts++;
            }
        }

        function handleInput(e) {
            const key = e.key.toLowerCase();
            if (key === 'arrowup' && p1.dir !== 'down') p1.nextDir = 'up';
            if (key === 'arrowdown' && p1.dir !== 'up') p1.nextDir = 'down';
            if (key === 'arrowleft' && p1.dir !== 'right') p1.nextDir = 'left';
            if (key === 'arrowright' && p1.dir !== 'left') p1.nextDir = 'right';
            if (key === 'w' && p2.dir !== 'down') p2.nextDir = 'up';
            if (key === 's' && p2.dir !== 'up') p2.nextDir = 'down';
            if (key === 'a' && p2.dir !== 'right') p2.nextDir = 'left';
            if (key === 'd' && p2.dir !== 'left') p2.nextDir = 'right';
        }

        function moveSnake(p) {
            p.dir = p.nextDir;
            const head = { ...p.snake[0] };
            if (p.dir === 'up') head.y -= 1;
            if (p.dir === 'down') head.y += 1;
            if (p.dir === 'left') head.x -= 1;
            if (p.dir === 'right') head.x += 1;

            if (gameMode === 'dual') {
                if (head.x < 0) head.x = BOARD_SIZE - 1;
                else if (head.x >= BOARD_SIZE) head.x = 0;
                if (head.y < 0) head.y = BOARD_SIZE - 1;
                else if (head.y >= BOARD_SIZE) head.y = 0;
            }
            return head;
        }

        function checkCollision(head, selfSnake, otherSnake) {
            if (!head) return false;
            if (gameMode === 'single') {
                if (head.x < 0 || head.x >= BOARD_SIZE || head.y < 0 || head.y >= BOARD_SIZE) return true;
            }
            if (selfSnake.some(s => s.x === head.x && s.y === head.y)) return true;
            if (otherSnake && otherSnake.some(s => s.x === head.x && s.y === head.y)) return true;
            return false;
        }

        function update() {
            if (!gameActive) return;

            const p1Head = p1.active ? moveSnake(p1) : null;
            const p2Head = p2.active ? moveSnake(p2) : null;

            let p1Col = p1.active ? checkCollision(p1Head, p1.snake, p2.snake) : false;
            let p2Col = p2.active ? checkCollision(p2Head, p2.snake, p1.snake) : false;

            if (p1Head && p2Head && p1Head.x === p2Head.x && p1Head.y === p2Head.y) {
                p1Col = true; p2Col = true;
            }

            if (p1Col) { p1.active = false; p1.eliminated = true; p1.snake = []; }
            if (p2Col) { p2.active = false; p2.eliminated = true; p2.snake = []; }

            if (!p1.active && !p2.active) {
                let msg = "DRAW!";
                if (p1.score > p2.score) msg = p1.name + " WINS!";
                if (p2.score > p1.score) msg = p2.name + " WINS!";
                endGame(msg);
                return;
            }

            if (p1.active) {
                p1.snake.unshift(p1Head);
                const idx = foods.findIndex(f => f.x === p1Head.x && f.y === p1Head.y);
                if (idx !== -1) {
                    p1.score += SCORE_PER_FOOD; updateScores();
                    foods.splice(idx, 1); spawnFood();
                    baseSpeed = Math.max(MIN_SPEED, baseSpeed - SPEED_INCREMENT);
                } else { p1.snake.pop(); }
            }

            if (p2.active) {
                p2.snake.unshift(p2Head);
                const idx = foods.findIndex(f => f.x === p2Head.x && f.y === p2Head.y);
                if (idx !== -1) {
                    p2.score += SCORE_PER_FOOD; updateScores();
                    foods.splice(idx, 1); spawnFood();
                    baseSpeed = Math.max(MIN_SPEED, baseSpeed - SPEED_INCREMENT);
                } else { p2.snake.pop(); }
            }

            speed = Math.max(MIN_SPEED, baseSpeed);
        }

        function drawSnake(p) {
            p.snake.forEach((seg, i) => {
                const isHead = i === 0;
                ctx.fillStyle = isHead ? p.colorHead : p.colorBody;
                ctx.shadowBlur = isHead ? 15 : 8;
                ctx.shadowColor = isHead ? p.colorHead : p.colorBody;
                const size = isHead ? GRID_SIZE - 2 : GRID_SIZE - 4;
                const off = isHead ? 1 : 2;
                ctx.fillRect(seg.x * GRID_SIZE + off, seg.y * GRID_SIZE + off, size, size);
            });
        }

        function draw() {
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, logicalWidth, logicalHeight);

            ctx.strokeStyle = 'rgba(0, 255, 204, 0.04)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= logicalWidth; i += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, logicalHeight); ctx.stroke(); }
            for (let i = 0; i <= logicalHeight; i += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(logicalWidth, i); ctx.stroke(); }

            ctx.fillStyle = '#ffff00';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ffff00';
            foods.forEach(f => {
                ctx.fillRect(f.x * GRID_SIZE + 2, f.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
            });

            if (p1.active) drawSnake(p1);
            if (p2.active) drawSnake(p2);
            ctx.shadowBlur = 0;
        }

        function endGame(msg) {
            gameActive = false;
            if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
            const title = document.getElementById('game-over-title');
            if (gameMode === 'single') {
                title.textContent = "GAME OVER";
                winnerText.textContent = p1.name + ": " + p1.score;
                document.getElementById('p2-stats').style.display = 'none';
                document.getElementById('p1-stats').style.display = 'none';
            } else {
                title.textContent = "KO";
                winnerText.textContent = msg;
                document.getElementById('p2-stats').style.display = 'block';
                document.getElementById('p1-stats').style.display = 'block';
                document.getElementById('p1-stats').innerHTML = p1.name + ': <span class="neon-p1">' + p1.score + '</span>';
                document.getElementById('p2-stats').innerHTML = p2.name + ': <span class="neon-p2">' + p2.score + '</span>';
            }
            gameOverScreen.classList.remove('hidden');
            // D-pad stays visible on touch devices even on game over
        }

        function gameLoop(currentTime) {
            if (!gameActive) return;
            if (currentTime - lastUpdateTime >= speed) {
                update(); draw();
                lastUpdateTime = currentTime;
            }
            animFrameId = requestAnimationFrame(gameLoop);
        }

        // === EVENT LISTENERS ===
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', () => { resizeCanvas(); setTimeout(resizeCanvas, 150); });
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 250));
        window.addEventListener('keydown', handleInput);

        // Touch D-pad
        ['d-up', 'd-down', 'd-left', 'd-right'].forEach(id => {
            const dir = id.replace('d-', '');
            const btn = document.getElementById(id);
            const handler = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const opp = { up: 'down', down: 'up', left: 'right', right: 'left' };
                if (p1.dir === opp[dir]) return;
                p1.nextDir = dir;
            };
            btn.addEventListener('touchstart', handler, { passive: false });
            btn.addEventListener('mousedown', handler);
        });

        // Swipe gestures as backup
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (!gameActive) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx), absDy = Math.abs(dy);
            if (Math.max(absDx, absDy) < 30) return; // Too small
            if (absDx > absDy) {
                if (dx > 0 && p1.dir !== 'left') p1.nextDir = 'right';
                else if (dx < 0 && p1.dir !== 'right') p1.nextDir = 'left';
            } else {
                if (dy > 0 && p1.dir !== 'up') p1.nextDir = 'down';
                else if (dy < 0 && p1.dir !== 'down') p1.nextDir = 'up';
            }
        }, { passive: true });

        // Button listeners
        singleBtn.addEventListener('click', () => { startScreen.classList.add('hidden'); initGame('single'); });
        dualBtn.addEventListener('click', () => { startScreen.classList.add('hidden'); initGame('dual'); });
        restartBtn.addEventListener('click', () => { gameOverScreen.classList.add('hidden'); initGame(); });
        exitBtn.addEventListener('click', () => {
            gameActive = false;
            if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
            startScreen.classList.remove('hidden');
            gameOverScreen.classList.add('hidden');
            resizeCanvas();
        });

        // Prevent scroll during game
        document.body.addEventListener('touchmove', (e) => { if (gameActive) e.preventDefault(); }, { passive: false });

        // Init
        resizeCanvas();
        draw();
    </script>
</body>
</html>
